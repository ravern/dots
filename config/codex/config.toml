model = "gpt-5.5"
model_reasoning_effort = "high"

[features]
  codex_hooks = true
  rmcp_client = true

[mcp_servers]
  [mcp_servers.braintrust]
    url = "https://api.braintrust.dev/mcp"
    bearer_token_env_var = "BRAINTRUST_API_KEY"

  [mcp_servers.greptile]
    url = "https://api.greptile.com/mcp"
    bearer_token_env_var = "GREPTILE_API_KEY"

[notice]
  [notice.model_migrations]
    "gpt-5.3-codex" = "gpt-5.4"

[projects]
  [projects."/Users/ravern/Repos/greptileai/greptilia"]
    trust_level = "trusted"

[projects."/Users/ravern/Repos/greptileai/greptile"]
trust_level = "trusted"

[projects."/Users/ravern/Repos/ravern/sessions"]
trust_level = "trusted"

[plugins."vercel@openai-curated"]
enabled = true

[plugins."slack@openai-curated"]
enabled = true

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[plugins."browser@openai-bundled"]
enabled = true
